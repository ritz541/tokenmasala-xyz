name: Deploy

on:
  push:
    branches: [main]

# One deploy at a time, never cancelled mid-apply — alchemy state writes
# must not race.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Deploy
        run: bunx alchemy deploy --stage prod --yes
        env:
          ALCHEMY_STATE: cloudflare
          CLOUDFLARE_ACCOUNT_ID: 630f294bcb2c1e9b751d9fe0655a453a
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # GitHub blocks GITHUB_-prefixed secret names; map them here.
          GITHUB_CLIENT_ID: ${{ secrets.TMX_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.TMX_GITHUB_CLIENT_SECRET }}
